ScreenWidth = 320
ScreenHeight = 240


[Video-GLideN64]

configVersion = 24
bilinearMode = 1
CacheSize = 50
EnableFBEmulation = True
UseNativeResolutionFactor = 1
EnableLegacyBlending = True
